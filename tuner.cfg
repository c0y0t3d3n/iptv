# +KEY will append to the values, not replace them
# for all patterns included whitespace is matched, use this to avoid unwanted matches.

#for groups the default is to match full group name
#  |pattern will match the start of the name
#  pattern| will match the end of the name
#  !pattern will match the start of the name and exclude

#select groups of channels
#patterns to select and to exclude from the selected groups
groups=|USA,SPORTS,KIDS,ESPN
+groups=!LOCAL,!LOW,!LATIN,!RELIG,!PUBLIC

#for streams, pattern will match anywhere in name
# !pattern will match anywhere and exlude stream

#select and exclude individual streams by patterns
streams=! SD,!CA:,!CA ,!UK: ,!es: ,!west
+streams=nfl network,mlb network,nba tv,nhl network

#for rename, patterm will match anywhere in name by default
# |pattern will only match at the start
# pattern| will only match at the end
# matched patterns are removed from the name. pattern=text will replace the pattern with the text

#clean up prefixes and suffixes on channel names
rename=|REG: ,|USA ,|USA: ,|USA | ,|BASICS: 
+rename=(,),the , HD, SHD, east, channel, network, entertainment

#fix various differences in naming that prevent combining channels across providers
+rename=discovery science=science,
+rename=investigation discovery=ID
+rename=national geographic=NAT GEO
+rename=nickelodeon=NICK,
+rename=oxygen true crime=OXYGEN
+reanme=paramount TV=paramount
+rename=A & E=A&E
+rename=MS NOW=MSNBC
+rename=motortrend=discovery turbo
+rename=movies=movie
+rename=FX movie=FXM
+reanme=tru TV=truTV
+rename=logo TV=logo
+rename=sundance TV=sundance
+rename=ESPN U=ESPNU

#for replace, the pattern by default matches the end of the name. |pattern matches the start.
# channels matching the pattern will be renamed to remove the pattern.
# if there is a match and channels with that name minus the pattern exist, they will be removed.
# for example: if the pattern is ' HD' and 'ABC HD' exists, it will be renamed to 'ABC'
# any other channels named 'ABC' will be removed, but only if 'ABC HD' exists.

#replace standard channels with higher def channels.
#these are processed in order, so preference will be FHD, UHD, LHD
#Remove LHD if your provider's UHD is 4k, but for the accounts below FHD/UHD is 720p and LHD is 1080p.
replace=|FHD: , FHD, (UHD), UHD, LHD

