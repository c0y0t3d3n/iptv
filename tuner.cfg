#+KEY will append to the values, not replace them

#select groups of channels
#patterns to select and to exclude from the selected groups
groups=|USA,SPORTS,KIDS,ESPN
+groups=!LOCAL,!LOW,!LATIN,!RELIG,!PUBLIC

#select and exclude individual streams by patterns
streams=! SD,!CA:,!CA ,!UK: ,!es: ,!west
+streams=nfl network,mlb network,nba tv,nhl network

#clean up prefixes and suffixes on channel names
rename=|REG: ,|USA ,|USA: ,|USA | ,|BASICS: 
+rename=(,),the , HD, SHD, east, channel, network, entertainment

#fix various differences in naming that prevent combining channels across providers
+rename=discovery science=science,
+rename=investigation discovery=ID
+rename=national geographic=NAT GEO
+rename=nickelodeon=NICK,
+rename=oxygen true crime=OXYGEN
+reanme=paramount TV=paramount
+rename=A & E=A&E
+rename=MS NOW=MSNBC
+rename=motortrend=discovery turbo
+rename=movies=movie
+rename=FX movie=FXM
+reanme=tru TV=truTV
+rename=logo TV=logo
+rename=sundance TV=sundance
+rename=ESPN U=ESPNU

#replace standard channels with higher def channels.
#these are processed in order, so preference will be FHD, UHD, LHD
#Remove LHD if your provider's UHD is 4k, but for the accounts below FHD/UHD is 720p and LHD is 1080p.
replace=|FHD: , FHD, (UHD), UHD, LHD

